<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>肚肚痛监测站 💢 | Scallion Protocol v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b6b; --bg: #fff9db; --card-bg: #ffffff; --text: #495057; --accent: #ffd43b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: var(--card-bg); width: 100%; max-width: 480px; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(255, 107, 107, 0.15); margin-bottom: 15px; text-align: center; }
        #btn-main {
            width: 130px; height: 130px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px 0 #c92a2a; outline: none; transition: 0.1s;
        }
        #btn-main:active { transform: translateY(5px); box-shadow: 0 2px 0 #c92a2a; }
        #count-val { font-size: 3.5rem; color: var(--primary); font-weight: 900; display: block; margin: 10px 0; }
        .joke-card { border: 2px solid var(--accent); background: #fffdf5; text-align: left; }
        .joke-header { color: #e67e22; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        .joke-content { font-size: 0.85rem; line-height: 1.6; color: #6f5540; min-height: 60px; }
        .history { max-height: 150px; overflow-y: auto; text-align: left; padding: 10px; background: #f8f9fa; font-size: 0.75rem; border-radius: 12px; margin-top: 10px; }
        .history-item { padding: 5px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; }
        .chart-container { height: 200px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🤣 痛了吗？</h1>
        <div style="padding:15px 0;"><button id="btn-main">肚肚痛了！</button></div>
        <div>今日累计痛感 <span id="count-val">0</span></div>
        <div class="chart-container"><canvas id="myChart"></canvas></div>
    </div>

    <div class="card joke-card">
        <div class="joke-header">✨ 泰拉地域偏见大赏</div>
        <div id="joke-content" class="joke-content">载入中...</div>
    </div>

    <div class="card">
        <h3>📜 最近轨迹</h3>
        <div id="history-list" class="history">加载中...</div>
    </div>

    <script>
        const SB_URL = "https://nbhaqiynakkdlequbpbh.supabase.co"; 
        const SB_KEY = "sb_publishable_MfHndIpykrX79UrvosT9Nw_JxCYYfbp"; 
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        let myChart = null;

        const TERRA_LOCS = ["阿戈尔", "哥伦比亚", "拉特兰", "叙拉古", "炎国", "乌萨斯", "卡西米尔", "谢拉格", "维多利亚", "萨米", "雷姆必拓", "伊比利亚", "龙门", "卡兹戴尔", "汐斯塔", "叙拉古", "玻利瓦尔"];
        const TERRA_JOKES = [
            "<b>叙拉古：</b>永远不要在意面上挤番茄酱，除非你想被塞进油桶。",
            "<b>拉特兰：</b>解决纠纷的方式很简单——比谁家炸弹回声好听。",
            "<b>炎国：</b>二十岁不泡枸杞会被开除出“岁”相。",
            "<b>阿戈尔：</b>看电影只看像素，水波纹不圆润直接退场。",
            "<b>罗德岛：</b>这里的人能忍受博士在嘴里泡面，还能忍受指挥掉线。"
        ];

        document.getElementById('btn-main').onclick = async () => {
            const loc = `IP属地：${TERRA_LOCS[Math.floor(Math.random() * TERRA_LOCS.length)]}`;
            await sbClient.from('records').insert([{ location: loc }]);
            fetchData();
        };

        async function fetchData() {
            // 获取今天北京时间 0 点的时间戳
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayISO = today.toISOString();

            // 直接查询，不使用任何 RPC 函数
            const { data, error } = await sbClient
                .from('records')
                .select('*')
                .gte('created_at', todayISO)
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            // 更新总数
            document.getElementById('count-val').innerText = data.length;

            // 更新列表
            document.getElementById('history-list').innerHTML = data.slice(0, 20).map(r => `
                <div class="history-item">
                    <span>🕒 ${new Date(r.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    <span style="color:#ff6b6b">${r.location}</span>
                </div>
            `).join('');

            // 更新折线图
            renderChart(data);
        }

        function renderChart(todayData) {
            const ctx = document.getElementById('myChart').getContext('2d');
            const dataCounts = Array(24).fill(0);
            
            // 统计每个小时的数量
            todayData.forEach(r => {
                const hour = new Date(r.created_at).getHours();
                dataCounts[hour]++;
            });

            const currentHour = new Date().getHours();
            const labels = Array.from({length: currentHour + 1}, (_, i) => i + ":00");
            const finalData = dataCounts.slice(0, currentHour + 1);

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: finalData,
                        borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function rotateJoke() {
            document.getElementById('joke-content').innerHTML = TERRA_JOKES[Math.floor(Math.random() * TERRA_JOKES.length)];
        }

        fetchData();
        rotateJoke();
        setInterval(fetchData, 30000);
        setInterval(rotateJoke, 15000);
    </script>
</body>
</html>
