<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>肚肚痛监测站 💢 | Scallion v7.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b6b; --bg: #fff9db; --card-bg: #ffffff; --text: #495057; --accent: #ffd43b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card-bg); width: 100%; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(255, 107, 107, 0.15); margin-bottom: 15px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.8); }
        
        /* 按钮样式 */
        #btn-main {
            width: 130px; height: 130px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px 0 #c92a2a; outline: none; transition: 0.1s;
        }
        #btn-main:active { transform: translateY(6px); box-shadow: 0 2px 0 #c92a2a; }
        #count-val { font-size: 4rem; color: var(--primary); font-weight: 900; display: block; line-height: 1; margin: 10px 0; }
        
        /* 笑话卡片与进度条 */
        .joke-card { border: 2px solid var(--accent); background: #fffdf5; text-align: left; padding: 15px; position: relative; overflow: hidden; }
        .joke-header { color: #e67e22; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; border-bottom: 1px dashed var(--accent); padding-bottom: 5px; }
        .joke-content { font-size: 0.85rem; line-height: 1.6; color: #6f5540; min-height: 85px; }
        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #eee; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        /* 图表与历史记录 */
        .chart-container { height: 180px; width: 100%; margin-top: 10px; }
        .history { max-height: 150px; overflow-y: auto; text-align: left; padding: 10px; background: #f8f9fa; font-size: 0.75rem; border-radius: 12px; margin-top: 10px; border: 1px inset #eee; }
        .loc-tag { color: #ff6b6b; font-weight: bold; background: #ffe3e3; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 style="margin:0">🤣 痛了吗？</h2>
            <div style="padding:15px 0;"><button id="btn-main">肚肚痛了</button></div>
            <div>今日累计痛感 <span id="count-val">0</span></div>
            <div class="chart-container"><canvas id="chartHour"></canvas></div>
        </div>

        <div class="card">
            <h3 style="margin:0">📅 最近七日趋势</h3>
            <div class="chart-container"><canvas id="chartDay"></canvas></div>
        </div>

        <div class="card joke-card">
            <div class="joke-header">✨ 泰拉地域偏见大赏</div>
            <div id="joke-content" class="joke-content">情报解密中...</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
        </div>

        <div class="card">
            <h3 style="margin:0">📜 历史轨迹 (Top 25)</h3>
            <div id="history-list" class="history">加载中...</div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nbhaqiynakkdlequbpbh.supabase.co"; 
        const SB_KEY = "sb_publishable_MfHndIpykrX79UrvosT9Nw_JxCYYfbp"; 
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        let chartH = null, chartD = null;
        let jokeTimer = 0;
        const JOKE_DURATION = 15000; // 15秒切换一次

        const TERRA_LOCS = ["阿戈尔", "玻利瓦尔", "多索雷斯", "东国", "二户城", "哥伦比亚", "特里蒙", "卡西米尔", "卡兹戴尔", "拉特兰", "莱塔尼亚", "雷姆必拓", "萨尔贡", "萨米", "维多利亚", "伦蒂尼姆", "乌萨斯", "谢拉格", "叙拉古", "炎国", "龙门", "伊比利亚", "汐斯塔"];

        const TERRA_JOKES = [
            "<b>叙拉古：</b>永远不要在意面上挤番茄酱，否则会被塞进油桶沉入荒野。",
            "<b>拉特兰：</b>纠纷全靠炸弹回声，爆炸不够清脆说明信仰不足。",
            "<b>哥伦比亚：</b>路边的猫都能给你讲三分钟创投计划，不听就起诉你。",
            "<b>乌萨斯：</b>这里没有感冒，只有伏特加纯度不够。",
            "<b>炎国：</b>二十岁不泡枸杞会被开除出“岁”相，这里比武先比养生。",
            "<b>卡西米尔：</b>竞技骑士不一定骑马，但闪光灯一定要能闪瞎路人。",
            "<b>阿戈尔：</b>看电影只看水波纹像素，不圆润直接集体退场投诉。",
            "<b>萨米：</b>萨米人从不迷路，他们只是在和树木进行长达三天的对话。",
            "<b>维多利亚：</b>只要管家没宣布喝茶结束，就算天上下源石也能优雅坐着。",
            "<b>卫戍协议：</b>最恐怖的不是Boss，而是肚子痛时突然跳出的网络中断。"
        ];

        document.getElementById('btn-main').onclick = async () => {
            const loc = `IP属地：${TERRA_LOCS[Math.floor(Math.random() * TERRA_LOCS.length)]}`;
            await sbClient.from('records').insert([{ location: loc }]);
            fetchData();
        };

        async function fetchData() {
            try {
                const now = new Date();
                const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
                const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000).toISOString();

                // 1. 获取今日总数（突破1000限制逻辑）
                const { count: totalToday } = await sbClient
                    .from('records').select('*', { count: 'exact', head: true }).gte('created_at', today0);
                document.getElementById('count-val').innerText = totalToday || 0;

                // 2. 获取记录（用于图表和列表）
                const { data: records } = await sbClient
                    .from('records').select('*').gte('created_at', sevenDaysAgo).order('created_at', { ascending: false }).limit(1000);

                if (records) {
                    document.getElementById('history-list').innerHTML = records.slice(0, 25).map(r => `
                        <div class="history-item">
                            <span>🕒 ${new Date(r.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                            <span class="loc-tag">${r.location}</span>
                        </div>
                    `).join('');
                    renderCharts(records, now);
                }
            } catch (e) { console.error("Data error:", e); }
        }

        function renderCharts(records, now) {
            const hourCounts = Array(24).fill(0);
            const todayStr = now.toLocaleDateString();
            records.filter(r => new Date(r.created_at).toLocaleDateString() === todayStr)
                   .forEach(r => hourCounts[new Date(r.created_at).getHours()]++);

            if (chartH) chartH.destroy();
            chartH = new Chart(document.getElementById('chartHour').getContext('2d'), {
                type: 'line',
                data: { 
                    labels: Array.from({length: now.getHours() + 1}, (_, i) => i + ":00"), 
                    datasets: [{ data: hourCounts.slice(0, now.getHours() + 1), borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', fill: true, tension: 0.4 }] 
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

            const dayCounts = {};
            for(let i=6; i>=0; i--) {
                const d = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                dayCounts[(d.getMonth()+1)+"/"+d.getDate()] = 0;
            }
            records.forEach(r => {
                const d = new Date(r.created_at);
                const label = (d.getMonth()+1)+"/"+d.getDate();
                if(dayCounts.hasOwnProperty(label)) dayCounts[label]++;
            });

            if (chartD) chartD.destroy();
            chartD = new Chart(document.getElementById('chartDay').getContext('2d'), {
                type: 'line',
                data: { labels: Object.keys(dayCounts), datasets: [{ data: Object.values(dayCounts), borderColor: '#4dabf7', backgroundColor: 'rgba(77, 171, 247, 0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // --- 进度条逻辑 ---
        function updateJoke() {
            const el = document.getElementById('joke-content');
            el.innerHTML = TERRA_JOKES[Math.floor(Math.random() * TERRA_JOKES.length)];
            jokeTimer = 0;
        }

        function handleProgressBar() {
            jokeTimer += 100;
            const percentage = (jokeTimer / JOKE_DURATION) * 100;
            document.getElementById('progress-bar').style.width = Math.min(percentage, 100) + "%";
            if (jokeTimer >= JOKE_DURATION) updateJoke();
        }

        fetchData();
        updateJoke();
        setInterval(fetchData, 30000); // 30秒同步一次数据
        setInterval(handleProgressBar, 100); // 0.1秒更新一次进度条
    </script>
</body>
</html>
