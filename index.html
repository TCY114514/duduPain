<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>肚肚痛监测站 💢 | Scallion Protocol v5.0 Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b6b; --bg: #fff9db; --card-bg: #ffffff; --text: #495057; --accent: #ffd43b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card-bg); width: 100%; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(255, 107, 107, 0.15); margin-bottom: 15px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.8); }
        .joke-card { border: 2px solid var(--accent); background: #fffdf5; text-align: left; }
        .joke-header { color: #e67e22; font-weight: bold; margin-bottom: 10px; border-bottom: 1px dashed var(--accent); padding-bottom: 5px; }
        .joke-content { font-size: 0.85rem; line-height: 1.6; color: #6f5540; min-height: 80px; transition: opacity 0.5s; }
        #btn-main {
            width: 130px; height: 130px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px 0 #c92a2a; outline: none; transition: 0.1s;
        }
        #btn-main:active { transform: translateY(5px); box-shadow: 0 2px 0 #c92a2a; }
        #count-val { font-size: 3.5rem; color: var(--primary); font-weight: 900; display: block; margin: 5px 0; }
        .chart-container { height: 180px; width: 100%; margin-top: 10px; }
        .history { max-height: 150px; overflow-y: auto; text-align: left; padding: 10px; background: #f8f9fa; font-size: 0.75rem; border-radius: 12px; margin-top: 10px; border: 1px inset #eee; }
        .history-item { padding: 6px 0; border-bottom: 1px dashed #ddd; display: flex; justify-content: space-between; }
        .loc-tag { color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>🤣 痛了吗？</h1>
            <div style="padding:15px 0;"><button id="btn-main">肚肚痛了！</button></div>
            <div>今日累计痛感 <span id="count-val">0</span></div>
            <div class="chart-container"><canvas id="chartHour"></canvas></div>
        </div>

        <div class="card">
            <h3>📅 最近七日趋势</h3>
            <div class="chart-container"><canvas id="chartDay"></canvas></div>
        </div>

        <div class="card joke-card">
            <div class="joke-header">✨ 泰拉地域偏见大赏</div>
            <div id="joke-content" class="joke-content">正在载入情报...</div>
        </div>

        <div class="card">
            <h3>📜 历史轨迹 (最新30条)</h3>
            <div id="history-list" class="history">加载中...</div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nbhaqiynakkdlequbpbh.supabase.co"; 
        const SB_KEY = "sb_publishable_MfHndIpykrX79UrvosT9Nw_JxCYYfbp"; 
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        let chartH = null, chartD = null;

        const TERRA_LOCS = ["阿戈尔", "玻利瓦尔", "多索雷斯", "东国", "二户城", "杜林", "际崖城", "天际城", "哥伦比亚", "特里蒙", "卡西米尔", "卡兹戴尔", "拉特兰", "莱塔尼亚", "雷姆必拓", "萨尔贡", "萨米", "维多利亚", "乌萨斯", "谢拉格", "叙拉古", "炎国", "龙门", "伊比利亚", "汐斯塔"];
        const TERRA_JOKES = [
            "<b>叙拉古：</b>永远不要在意面上挤番茄酱，除非你想尝试被塞进油桶。",
            "<b>拉特兰：</b>解决邻里纠纷的方式很简单——比谁家炸弹的回声更好听。",
            "<b>哥伦比亚：</b>在这里，流浪猫都能给你讲三分钟的投资计划，不听就起诉你。",
            "<b>炎国：</b>如果你二十岁还没开始用保温杯泡枸杞，你会被开除出“岁”相。",
            "<b>乌萨斯：</b>这里没有“感冒”，只有“伏特加纯度不够”。",
            "<b>罗德岛：</b>这里的人能忍受博士在嘴里泡面，还能忍受指挥突然掉线。"
        ];

        document.getElementById('btn-main').onclick = async () => {
            const loc = `IP属地：${TERRA_LOCS[Math.floor(Math.random() * TERRA_LOCS.length)]}`;
            await sbClient.from('records').insert([{ location: loc }]);
            fetchData();
        };

        async function fetchData() {
            try {
                const now = new Date();
                const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
                const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000).toISOString();

                // 1. 获取今日总数（使用 head:true 绕过 1000 条获取限制，只查数量）
                const { count: todayCount } = await sbClient
                    .from('records')
                    .select('*', { count: 'exact', head: true })
                    .gte('created_at', today0);
                document.getElementById('count-val').innerText = todayCount || 0;

                // 2. 获取最近 30 条历史记录
                const { data: recentData } = await sbClient
                    .from('records')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(30);

                // 3. 获取过去 7 天的所有数据用于画图 (如果数据真超了几千条，这里会只取前1000条，但对趋势影响不大)
                const { data: chartData } = await sbClient
                    .from('records')
                    .select('created_at')
                    .gte('created_at', sevenDaysAgo);

                if (recentData) {
                    document.getElementById('history-list').innerHTML = recentData.map(r => `
                        <div class="history-item">
                            <span>🕒 ${new Date(r.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                            <span class="loc-tag">${r.location}</span>
                        </div>
                    `).join('');
                }

                if (chartData) {
                    renderCharts(chartData);
                }
            } catch (e) { console.error("数据加载失败", e); }
        }

        function renderCharts(allData) {
            const now = new Date();
            const hourCounts = Array(24).fill(0);
            const dayCounts = {};

            // 初始化最近7天日期标签
            for(let i=6; i>=0; i--) {
                const d = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                const label = (d.getMonth()+1) + "/" + d.getDate();
                dayCounts[label] = 0;
            }

            const todayStr = now.toLocaleDateString();

            allData.forEach(r => {
                const d = new Date(r.created_at);
                // 小时统计（仅限今日）
                if(d.toLocaleDateString() === todayStr) {
                    hourCounts[d.getHours()]++;
                }
                // 每日统计
                const dLabel = (d.getMonth()+1) + "/" + d.getDate();
                if(dayCounts.hasOwnProperty(dLabel)) {
                    dayCounts[dLabel]++;
                }
            });

            // 渲染小时图
            const hourLabels = Array.from({length: now.getHours() + 1}, (_, i) => i + ":00");
            const hourData = hourCounts.slice(0, now.getHours() + 1);
            
            if (chartH) chartH.destroy();
            chartH = new Chart(document.getElementById('chartHour').getContext('2d'), {
                type: 'line',
                data: { labels: hourLabels, datasets: [{ data: hourData, borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });

            // 渲染每日图
            if (chartD) chartD.destroy();
            chartD = new Chart(document.getElementById('chartDay').getContext('2d'), {
                type: 'line',
                data: {
                    labels: Object.keys(dayCounts),
                    datasets: [{ data: Object.values(dayCounts), borderColor: '#4dabf7', backgroundColor: 'rgba(77, 171, 247, 0.1)', fill: true, tension: 0.3 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function rotateJoke() {
            const el = document.getElementById('joke-content');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerHTML = TERRA_JOKES[Math.floor(Math.random() * TERRA_JOKES.length)];
                el.style.opacity = 1;
            }, 500);
        }

        fetchData(); rotateJoke();
        setInterval(fetchData, 30000); setInterval(rotateJoke, 15000);
    </script>
</body>
</html>
