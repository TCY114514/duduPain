<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>🧅 大葱肚肚痛中心 | v12.0 极客分线</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b6b; --bg: #fff9db; --card-bg: #ffffff; --text: #495057; --accent: #ffd43b; --leaf: #51cf66; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; padding-bottom: 40px; }
        .card { background: var(--card-bg); width: 100%; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(255, 107, 107, 0.1); margin-bottom: 15px; border: 3px solid #fff; position: relative; }
        
        /* 核心计数 */
        #btn-main {
            width: 130px; height: 130px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px 0 #c92a2a; outline: none; transition: 0.1s; margin: 10px 0;
        }
        #btn-main:active { transform: translateY(6px); box-shadow: 0 2px 0 #c92a2a; }
        #count-val { font-size: 4rem; color: var(--primary); font-weight: 900; line-height: 1; }

        /* 📝 独立分表留言板 */
        .board-container { background: #fdfae5; border: 2px solid var(--accent); border-radius: 20px; padding: 15px; margin: 15px 0; text-align: left; }
        .board-title { font-size: 0.8rem; font-weight: bold; color: #e67e22; margin-bottom: 10px; display: flex; justify-content: space-between; }
        #msg-scroll-box { height: 120px; overflow-y: auto; font-size: 0.85rem; border-radius: 10px; padding: 10px; background: white; border: 1px inset #eee; scroll-behavior: smooth; }
        .msg-item { padding: 6px 0; border-bottom: 1px dashed #eee; line-height: 1.4; display: flex; flex-direction: column; }
        .msg-meta { font-size: 0.65rem; color: #999; margin-bottom: 2px; }
        .msg-author { color: var(--leaf); font-weight: bold; font-family: monospace; }

        /* ⌨️ 留言输入 */
        .input-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        input { border: 2px solid #eee; border-radius: 10px; padding: 10px; font-size: 0.8rem; outline: none; }
        input:focus { border-color: var(--accent); }
        #in-content { flex: 1 1 100%; }
        #in-author { flex: 1; }
        #btn-send { background: var(--leaf); color: white; border: none; border-radius: 10px; padding: 0 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #btn-send:active { background: #2b8a3e; transform: scale(0.95); }

        /* 进度条笑话 */
        .joke-card { border: 2px solid var(--accent); text-align: left; position: relative; overflow: hidden; padding-bottom: 25px; }
        .prog-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: #eee; }
        #prog-fill { width: 0%; height: 100%; background: var(--accent); }

        .chart-box { height: 150px; width: 100%; }
        .hist-list { max-height: 100px; overflow-y: auto; font-size: 0.75rem; text-align: left; background: #f8f9fa; border-radius: 10px; padding: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2 style="margin:0; font-size: 1.1rem; color: var(--leaf);">🟢 SCALLION CENTER v12.0</h2>
            <button id="btn-main"><span>💥</span>肚肚痛了</button>
            <div>今日累计 <span id="count-val">0</span> 次 🧅</div>
            <div class="chart-box"><canvas id="chartHour"></canvas></div>
        </div>

        <div class="card">
            <div class="board-container">
                <div class="board-title"><span>💬 极客实时留言板</span><span id="sync-tag">⚡ 联机中</span></div>
                <div id="msg-scroll-box">通讯连接中... 📡</div>
                <div class="input-group">
                    <input type="text" id="in-content" placeholder="输入极客留言...">
                    <input type="text" id="in-author" placeholder="著名字号 (极客)">
                    <button id="btn-send">发送</button>
                </div>
            </div>
        </div>

        <div class="card joke-card">
            <div style="font-weight: bold; color: #e67e22; font-size: 0.85rem; margin-bottom: 8px;">🎭 泰拉地域偏见大赏</div>
            <div id="joke-text" style="font-size: 0.85rem; line-height: 1.5; min-height: 60px;">载入解密中... 🕵️‍♀️</div>
            <div class="prog-bg"><div id="prog-fill"></div></div>
        </div>

        <div class="card">
            <h3 style="margin:0; font-size:0.85rem; color:#999;">📅 最近七日活跃分布图</h3>
            <div class="chart-box"><canvas id="chartDay"></canvas></div>
        </div>

        <div class="card">
            <h3 style="margin:0; font-size:0.85rem; color:#999;">📜 历史位置轨迹</h3>
            <div id="hist-list" class="hist-list">...</div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nbhaqiynakkdlequbpbh.supabase.co"; 
        const SB_KEY = "sb_publishable_MfHndIpykrX79UrvosT9Nw_JxCYYfbp"; 
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        
        let chartH = null, chartD = null, jokeProgress = 0;
        const JOKES = [
            "<b>叙拉古：</b>永远不要在意面上挤番茄酱，否则会被塞进油桶。🥫",
            "<b>拉特兰：</b>纠纷全靠炸弹回声，爆炸不够清脆说明信仰不足。💣",
            "<b>哥伦比亚：</b>路边的猫都能给你讲三分钟创投计划。💼",
            "<b>乌萨斯：</b>这里没有感冒，只有伏特加纯度不够。🥃"
        ];
        const LOCS = ["阿戈尔 🌊", "哥伦比亚 🇺🇸", "叙拉古 🐺", "炎国 🐉", "龙门 🏮", "维多利亚 🦁", "拉特兰 😇"];

        // --- 功能：发送留言到 message 表 ---
        document.getElementById('btn-send').onclick = async () => {
            const content = document.getElementById('in-content').value;
            const author = document.getElementById('in-author').value || "匿名极客";
            if(!content) return;

            const { error } = await sbClient.from('messages').insert([{ content, author }]);
            if(!error) {
                document.getElementById('in-content').value = "";
                fetchMessages();
            }
        };

        // --- 功能：点击记录痛感 ---
        document.getElementById('btn-main').onclick = async () => {
            if (navigator.vibrate) navigator.vibrate(50);
            const loc = `坐标：${LOCS[Math.floor(Math.random()*LOCS.length)]}`;
            await sbClient.from('records').insert([{ location: loc }]);
            fetchData();
        };

        // --- 功能：获取留言 ---
        async function fetchMessages() {
            const { data } = await sbClient.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
            if(data) {
                document.getElementById('msg-scroll-box').innerHTML = data.map(m => `
                    <div class="msg-item">
                        <div class="msg-meta"><span class="msg-author">@${m.author}</span> · ${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        <div>${m.content}</div>
                    </div>
                `).join('');
            }
        }

        // --- 功能：获取统计数据 ---
        async function fetchData() {
            try {
                const now = new Date();
                const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
                
                // 1. 今日累计
                const { count } = await sbClient.from('records').select('*', { count: 'exact', head: true }).gte('created_at', today0);
                document.getElementById('count-val').innerText = count || 0;

                // 2. 轨迹明细
                const { data: records } = await sbClient.from('records').select('*').order('created_at', { ascending: false }).limit(300);

                if (records) {
                    document.getElementById('hist-list').innerHTML = records.slice(0, 15).map(r => `
                        <div style="display:flex;justify-content:space-between;padding:3px 0; border-bottom:1px dashed #eee;">
                            <span>🕒 ${new Date(r.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                            <span style="color:var(--primary)">${r.location}</span>
                        </div>
                    `).join('');
                    renderCharts(records, now);
                }
            } catch (e) {}
        }

        function renderCharts(records, now) {
            const hCounts = Array(24).fill(0);
            const todayStr = now.toLocaleDateString();
            records.filter(r => new Date(r.created_at).toLocaleDateString() === todayStr).forEach(r => hCounts[new Date(r.created_at).getHours()]++);
            if (chartH) chartH.destroy();
            chartH = new Chart(document.getElementById('chartHour').getContext('2d'), {
                type: 'line',
                data: { labels: Array.from({length: 24}, (_, i) => i + ":00"), datasets: [{ data: hCounts, borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

            const dayCounts = {};
            for(let i=6; i>=0; i--) {
                const d = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                dayCounts[(d.getMonth()+1)+"/"+d.getDate()] = 0;
            }
            records.forEach(r => {
                const d = new Date(r.created_at);
                const label = (d.getMonth()+1)+"/"+d.getDate();
                if(dayCounts.hasOwnProperty(label)) dayCounts[label]++;
            });
            if (chartD) chartD.destroy();
            chartD = new Chart(document.getElementById('chartDay').getContext('2d'), {
                type: 'line',
                data: { labels: Object.keys(dayCounts), datasets: [{ data: Object.values(dayCounts), borderColor: '#51cf66', backgroundColor: 'rgba(81,207,102,0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function handleJoke() {
            jokeProgress += 100;
            document.getElementById('prog-fill').style.width = (jokeProgress / 15000 * 100) + "%";
            if (jokeProgress >= 15000) {
                document.getElementById('joke-text').innerHTML = JOKES[Math.floor(Math.random()*JOKES.length)];
                jokeProgress = 0;
            }
        }

        // 初始化
        fetchData();
        fetchMessages();
        document.getElementById('joke-text').innerHTML = JOKES[0];
        setInterval(fetchData, 30000);
        setInterval(fetchMessages, 10000); // 10秒刷一次留言
        setInterval(handleJoke, 100);
    </script>
</body>
</html>
