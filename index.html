        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 1000px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .main-col, .side-col { flex: 1; min-width: 320px; max-width: 480px; }

            background: var(--card-bg); width: 100%; border-radius: 25px; padding: 20px; 
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.12); margin-bottom: 12px; 
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.8); position: relative; overflow: hidden;

        h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #888; }
        .btn-wrapper { display: flex; justify-content: center; padding: 15px 0; }
        #btn-main {
            width: 130px; height: 130px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252);
            color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px 0 #c92a2a, 0 12px 20px rgba(255,107,107,0.3);
            transition: 0.1s; outline: none; animation: pulse 2s infinite;
        }
        #btn-main:active { transform: translateY(5px); box-shadow: 0 3px 0 #c92a2a; animation: none; }
        #count-val { font-size: 3.5rem; color: var(--primary); font-weight: 900; display: block; line-height: 1; margin: 10px 0; }
        .refresh-tip { font-size: 0.65rem; color: #bbb; }
        .report { background: #fff5f5; padding: 12px; border-radius: 12px; text-align: left; border-left: 5px solid var(--primary); font-size: 0.8rem; line-height: 1.5; }

        function rotateJoke() {
            const el = document.getElementById('joke-content'), timer = document.getElementById('joke-timer');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerHTML = TERRA_JOKES[Math.floor(Math.random() * TERRA_JOKES.length)];
                el.style.opacity = 1;
                timer.style.transition = 'none'; timer.style.width = '0%';
                setTimeout(() => { timer.style.transition = 'width 15s linear'; timer.style.width = '100%'; }, 50);
            }, 500);
        }

        document.getElementById('btn-main').onclick = async () => {
            if (navigator.vibrate) navigator.vibrate(60);
            const loc = `IP属地：${TERRA_LOCS[Math.floor(Math.random() * TERRA_LOCS.length)]}`;
            await sbClient.from('records').insert([{ location: loc }]);
            fetchData();
        };

        async function fetchData() {
    try {
        // 1. 获取今日总数 (RPC)
        const { data: count } = await sbClient.rpc('get_today_count');
        document.getElementById('count-val').innerText = count || 0;

        // 2. 获取每小时统计数据 (RPC) - 这解决了折线图不准的问题
        const { data: hourlyStats } = await sbClient.rpc('get_hourly_stats');

        // 3. 获取最近 50 条用于显示历史列表 (普通查询即可)
        const { data: recentRecords } = await sbClient
            .from('records')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(50);

            document.getElementById('history-list').innerHTML = recentRecords.map(r => `

    } catch (err) {
        console.error("数据链路同步失败:", err);
    }
}

// 修改后的图表渲染函数
function renderCharts(hourlyStats) {
    const hCtx = document.getElementById('chartHour').getContext('2d');
    
    // 初始化 24 小时数据为 0
    const hData = Array(24).fill(0);
    // 将数据库返回的统计结果填入数组
    if (hourlyStats) {
        hourlyStats.forEach(item => {
            if (item.hour_val >= 0 && item.hour_val < 24) {
                hData[item.hour_val] = item.count_val;
            }
        });
    }
    
    // 只显示到当前小时
    const currentHour = new Date().getHours();
    const displayData = hData.slice(0, currentHour + 1);
    const labels = displayData.map((_, i) => i + ":00");

    if (chartH) chartH.destroy();
    chartH = new Chart(hCtx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '痛感频率',
                data: displayData,
                borderColor: '#ff6b6b',
                backgroundColor: 'rgba(255, 107, 107, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 } }
            }
        }
    });
}

        function renderCharts(todayRecs, allRecs) {
            const hCtx = document.getElementById('chartHour').getContext('2d'), dCtx = document.getElementById('chartDay').getContext('2d');
            const hData = Array(new Date().getHours() + 1).fill(0);
            todayRecs.forEach(r => { const h = new Date(r.created_at).getHours(); if(h < hData.length) hData[h]++; });
            
            if(chartH) chartH.destroy();
            chartH = new Chart(hCtx, { type: 'line', data: { labels: hData.map((_, i) => i+":00"), datasets: [{ data: hData, borderColor: '#ff6b6b', fill: true, tension: 0.4, backgroundColor: 'rgba(255,107,107,0.1)' }] }, options: { plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false } });

            const days = {}, labels = [];
            for(let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate()-i); labels.push((d.getMonth()+1)+"/"+d.getDate()); days[d.toDateString()] = 0; }
            allRecs.forEach(r => { const ds = new Date(r.created_at).toDateString(); if(days[ds]!==undefined) days[ds]++; });

            if(chartD) chartD.destroy();
            chartD = new Chart(dCtx, { type: 'line', data: { labels: labels, datasets: [{ data: Object.values(days), borderColor: '#4dabf7', fill: true, tension: 0.3, backgroundColor: 'rgba(77,171,247,0.1)' }] }, options: { plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false } });
        }

        fetchData(); rotateJoke();
        setInterval(fetchData, 30000); setInterval(rotateJoke, 15000);
