<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>大葱的肚肚痛监测站 💢</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b6b; --bg: #fff9db; --card-bg: #ffffff; --text: #495057; --accent: #ffd43b; --leaf: #51cf66; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card-bg); width: 100%; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(255, 107, 107, 0.15); margin-bottom: 15px; text-align: center; border: 2px solid #fff; position: relative; }
        
        /* 顶部状态栏 */
        .status-bar { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 10px; font-weight: bold; color: var(--leaf); }

        /* 核心大圆按钮 */
        #btn-main {
            width: 140px; height: 140px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px 0 #c92a2a, 0 15px 20px rgba(255, 107, 107, 0.3); outline: none; transition: 0.1s;
        }
        #btn-main:active { transform: translateY(6px); box-shadow: 0 2px 0 #c92a2a; }
        #count-val { font-size: 4.5rem; color: var(--primary); font-weight: 900; display: block; margin: 10px 0; }

        /* 大葱语录留言板 */
        .onion-msg { background: #f8f9fa; border-radius: 15px; padding: 12px; font-size: 0.85rem; color: #666; margin: 10px 0; border-left: 5px solid var(--leaf); font-style: italic; min-height: 45px; display: flex; align-items: center; justify-content: center; }

        /* 进度条笑话 */
        .joke-card { border: 2px solid var(--accent); background: #fffdf5; text-align: left; overflow: hidden; }
        .joke-header { color: #e67e22; font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; border-bottom: 1px dashed var(--accent); }
        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: #eee; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); }

        /* 图表与历史 */
        .chart-container { height: 160px; width: 100%; margin-top: 10px; }
        .history { max-height: 120px; overflow-y: auto; text-align: left; padding: 10px; background: #f8f9fa; font-size: 0.75rem; border-radius: 12px; margin-top: 10px; }
        .loc-tag { color: var(--primary); font-weight: bold; background: #ffe3e3; padding: 2px 6px; border-radius: 4px; }
        
        /* 成就弹窗 */
        #achievement { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: white; border: 3px solid var(--accent); padding: 10px 20px; border-radius: 50px; z-index: 100; transition: 0.5s; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="achievement">⭐ 解锁成就：第一滴葱汁</div>

    <div class="container">
        <div class="card">
            <div class="status-bar">
                <span id="onion-status">健康大葱 🍀</span>
                <span id="sanity-clock">理智恢复中...</span>
            </div>
            <h2 style="margin:0; font-size: 1.1rem; color: var(--leaf);">大葱监测站 v9.1</h2>
            <div style="padding:15px 0;"><button id="btn-main">肚肚痛了！</button></div>
            <div id="onion-msg" class="onion-msg">“今天也是元气满满的一天（大概）”</div>
            <div>今日累计 <span id="count-val">0</span> 次</div>
            <div class="chart-container"><canvas id="chartHour"></canvas></div>
        </div>

        <div class="card joke-card">
            <div class="joke-header">✨ 泰拉地域偏见大赏</div>
            <div id="joke-content" style="font-size: 0.85rem; line-height: 1.6; color: #6f5540; min-height: 60px;">载入中...</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
        </div>

        <div class="card">
            <h3 style="margin:0; font-size:0.9rem;">📅 最近七日痛感曲线</h3>
            <div class="chart-container"><canvas id="chartDay"></canvas></div>
        </div>

        <div class="card">
            <h3 style="margin:0; font-size:0.9rem;">📜 历史轨迹</h3>
            <div id="history-list" class="history">加载中...</div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nbhaqiynakkdlequbpbh.supabase.co"; 
        const SB_KEY = "sb_publishable_MfHndIpykrX79UrvosT9Nw_JxCYYfbp"; 
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        let chartH = null, chartD = null, jokeTimer = 0;

        const ONION_QUOTES = ["呜...又要变葱花了吗？", "感觉肚子里有源石虫在跳舞。", "快给大葱充电...", "这是大葱的第N次紧急避险。", "坚持住，大葱！", "需要摸摸头才能好。"];
        const TERRA_LOCS = ["阿戈尔", "哥伦比亚", "拉特兰", "叙拉古", "炎国", "乌萨斯", "卡西米尔", "谢拉格", "维多利亚", "龙门"];
        const JOKES = [
            "<b>叙拉古：</b>永远不要在意面上挤番茄酱，否则会被塞进油桶。",
            "<b>拉特兰：</b>纠纷全靠炸弹回声，爆炸不够清脆说明信仰不足。",
            "<b>哥伦比亚：</b>路边的猫都能给你讲三分钟创投计划。",
            "<b>乌萨斯：</b>这里没有感冒，只有伏特加纯度不够。"
        ];

        document.getElementById('btn-main').onclick = async () => {
            if (navigator.vibrate) navigator.vibrate(50);
            document.getElementById('onion-msg').innerText = `“${ONION_QUOTES[Math.floor(Math.random()*ONION_QUOTES.length)]}”`;
            const loc = `IP属地：${TERRA_LOCS[Math.floor(Math.random() * TERRA_LOCS.length)]}`;
            await sbClient.from('records').insert([{ location: loc }]);
            fetchData();
        };

        async function fetchData() {
            try {
                const now = new Date();
                const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
                
                // 1. 无限计数
                const { count } = await sbClient.from('records').select('*', { count: 'exact', head: true }).gte('created_at', today0);
                const total = count || 0;
                document.getElementById('count-val').innerText = total;

                // 2. 状态逻辑
                let status = "健康大葱 🍀";
                if(total > 5) status = "有点蔫的大葱 🍃";
                if(total > 15) status = "急需抢救的大葱 🚑";
                if(total > 30) status = "变成葱花的大葱 🌪️";
                document.getElementById('onion-status').innerText = status;

                // 3. 成就触发
                if(total === 1) popAchievement("首颗葱汁：痛感的开始");
                if(total === 10) popAchievement("葱葱铁人：抗压能葱");

                // 4. 数据拉取 (限制1000画图)
                const { data: records } = await sbClient.from('records').select('*').gte('created_at', new Date(now.getTime() - 7*24*60*60*1000).toISOString()).order('created_at', { ascending: false }).limit(500);

                if (records) {
                    document.getElementById('history-list').innerHTML = records.slice(0, 20).map(r => `
                        <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed #eee;">
                            <span>🕒 ${new Date(r.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                            <span class="loc-tag">${r.location}</span>
                        </div>
                    `).join('');
                    renderCharts(records, now);
                }
            } catch (e) {}
        }

        function popAchievement(txt) {
            const el = document.getElementById('achievement');
            el.innerText = `⭐ ${txt}`; el.style.top = "20px";
            setTimeout(() => el.style.top = "-100px", 3000);
        }

        function renderCharts(records, now) {
            const hCounts = Array(24).fill(0);
            const todayStr = now.toLocaleDateString();
            records.filter(r => new Date(r.created_at).toLocaleDateString() === todayStr).forEach(r => hCounts[new Date(r.created_at).getHours()]++);
            if (chartH) chartH.destroy();
            chartH = new Chart(document.getElementById('chartHour').getContext('2d'), {
                type: 'line',
                data: { labels: Array.from({length: now.getHours()+1}, (_, i) => i + ":00"), datasets: [{ data: hCounts.slice(0, now.getHours()+1), borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const dayCounts = {};
            for(let i=6; i>=0; i--) {
                const d = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                dayCounts[(d.getMonth()+1)+"/"+d.getDate()] = 0;
            }
            records.forEach(r => {
                const d = new Date(r.created_at);
                const label = (d.getMonth()+1)+"/"+d.getDate();
                if(dayCounts.hasOwnProperty(label)) dayCounts[label]++;
            });
            if (chartD) chartD.destroy();
            chartD = new Chart(document.getElementById('chartDay').getContext('2d'), {
                type: 'line',
                data: { labels: Object.keys(dayCounts), datasets: [{ data: Object.values(dayCounts), borderColor: '#51cf66', backgroundColor: 'rgba(81,207,102,0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function handleJoke() {
            jokeTimer += 100;
            document.getElementById('progress-bar').style.width = (jokeTimer / 15000 * 100) + "%";
            if (jokeTimer >= 15000) {
                document.getElementById('joke-content').innerHTML = JOKES[Math.floor(Math.random() * JOKES.length)];
                jokeTimer = 0;
            }
        }

        fetchData();
        document.getElementById('joke-content').innerHTML = JOKES[0];
        setInterval(fetchData, 30000);
        setInterval(handleJoke, 100);
        setInterval(() => {
            const nextHour = 60 - new Date().getMinutes();
            document.getElementById('sanity-clock').innerText = `理智回收中: ${nextHour}m`;
        }, 60000);
    </script>
</body>
</html>
