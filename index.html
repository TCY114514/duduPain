<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>肚肚痛监测站 💢 | Scallion Protocol v4.3</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b6b; --bg: #fff9db; --card-bg: #ffffff; --text: #495057; --accent: #ffd43b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .main-col, .side-col { flex: 1; min-width: 320px; max-width: 480px; }
        .card { background: var(--card-bg); width: 100%; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(255, 107, 107, 0.12); margin-bottom: 12px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.8); }
        .joke-card { border: 2px solid var(--accent); background: #fffdf5; position: relative; overflow: hidden; }
        .joke-header { color: #e67e22; font-weight: bold; margin-bottom: 10px; font-size: 1rem; }
        .joke-content { text-align: left; font-size: 0.85rem; line-height: 1.6; color: #6f5540; min-height: 80px; transition: opacity 0.5s; }
        .btn-wrapper { display: flex; justify-content: center; padding: 15px 0; }
        #btn-main {
            width: 130px; height: 130px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252);
            color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px 0 #c92a2a, 0 12px 20px rgba(255,107,107,0.3);
            transition: 0.1s; outline: none; animation: pulse 2s infinite;
        }
        #btn-main:active { transform: translateY(5px); box-shadow: 0 2px 0 #c92a2a; animation: none; }
        #count-val { font-size: 3.5rem; color: var(--primary); font-weight: 900; display: block; line-height: 1; margin: 10px 0; }
        .report { background: #fff5f5; padding: 12px; border-radius: 12px; text-align: left; border-left: 5px solid var(--primary); font-size: 0.8rem; line-height: 1.5; }
        .history { max-height: 180px; overflow-y: auto; text-align: left; padding: 8px; border-radius: 10px; background: #f8f9fa; font-size: 0.7rem; }
        .history-item { padding: 6px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; }
        .loc-tag { color: #ff6b6b; font-weight: bold; }
        .chart-container { height: 160px; width: 100%; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-col">
            <div class="card">
                <h1>🤣 痛了吗？</h1>
                <div class="btn-wrapper"><button id="btn-main"><span>😂</span>肚肚痛了！</button></div>
                <div>今日累计痛感 <span id="count-val">0</span> <small style="color:#bbb">(0点刷新)</small></div>
            </div>
            <div class="card">
                <h3>🕒 今日小时趋势</h3>
                <div class="chart-container"><canvas id="chartHour"></canvas></div>
            </div>
            <div class="card">
                <h3>📅 最近七日趋势</h3>
                <div class="chart-container"><canvas id="chartDay"></canvas></div>
            </div>
        </div>

        <div class="side-col">
            <div class="card joke-card">
                <div class="joke-header">✨ 泰拉大陆“地域偏见”大赏</div>
                <div id="joke-content" class="joke-content">正在搜集泰拉情报...</div>
            </div>
            <div class="card">
                <h3>📝 痛感日报</h3>
                <div id="report-text" class="report">数据链路同步中...</div>
            </div>
            <div class="card">
                <h3>📜 历史轨迹 (TOP 50)</h3>
                <div id="history-list" class="history">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nbhaqiynakkdlequbpbh.supabase.co"; 
        const SB_KEY = "sb_publishable_MfHndIpykrX79UrvosT9Nw_JxCYYfbp"; 
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        let chartH = null, chartD = null;

        const TERRA_LOCS = ["阿戈尔", "玻利瓦尔", "多索雷斯", "东国", "二户城", "杜林", "际崖城", "天际城", "哥伦比亚", "特里蒙", "卡西米尔", "卡兹戴尔", "拉特兰", "莱塔尼亚", "雷姆必拓", "萨尔贡", "萨米", "维多利亚", "乌萨斯", "谢拉格", "叙拉古", "炎国", "龙门", "伊比利亚", "汐斯塔"];
        const TERRA_JOKES = [
            "<b>叙拉古：</b>永远不要往意面上挤番茄酱，除非你想被塞进油桶沉入地底。",
            "<b>拉特兰：</b>解决邻里纠纷的方式就是比谁家炸弹回声好听，爆炸不够清脆说明信仰不足。",
            "<b>乌萨斯：</b>这里没有“感冒”，只有“伏特加纯度不够”和“风还不够喧嚣”。",
            "<b>哥伦比亚：</b>路边的流浪狗都能给你讲三分钟的财富自由计划，不听就起诉你侵犯演讲权。",
            "<b>阿戈尔：</b>吃饭前先往桌上泼桶水，看水流方向判断这地块精不精致。",
            "<b>炎国：</b>二十岁还没开始保温杯泡枸杞，会被开除出“岁”相。",
            "<b>罗德岛：</b>这里的人特质是：能忍受博士在嘴里泡面，还能忍受博士指挥掉线。"
        ];

        document.getElementById('btn-main').onclick = async () => {
            if (navigator.vibrate) navigator.vibrate(50);
            const loc = `IP属地：${TERRA_LOCS[Math.floor(Math.random() * TERRA_LOCS.length)]}`;
            await sbClient.from('records').insert([{ location: loc }]);
            fetchData();
        };

        async function fetchData() {
            try {
                // 1. 调用 RPC 获取精准总数
                const { data: count } = await sbClient.rpc('get_today_count');
                document.getElementById('count-val').innerText = count || 0;

                // 2. 调用 RPC 获取小时分布
                const { data: hourlyStats } = await sbClient.rpc('get_hourly_stats');

                // 3. 调用 RPC 获取七日分布
                const { data: dailyStats } = await sbClient.rpc('get_daily_stats_7days');

                // 4. 普通查询获取最近历史记录
                const { data: records } = await sbClient.from('records').select('*').order('created_at', { ascending: false }).limit(50);

                // 更新评价
                const evalTxt = count > 1433223 ? "🚑 <b style='color:red'>鬼手级别</b>：让大葱痛到这辈子抓不到大C" : count > 500 ? "💀 天灾级别" : count > 100 ? "🌋 高危" : "🌱 正常";
                document.getElementById('report-text').innerHTML = `<b>今日累计：</b>${count}次<br><b>评价：</b>${evalTxt}`;

                if(records) {
                    document.getElementById('history-list').innerHTML = records.map(r => `
                        <div class="history-item"><span>🕒 ${new Date(r.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span><span class="loc-tag">${r.location}</span></div>
                    `).join('');
                }

                if(hourlyStats) renderHourChart(hourlyStats);
                if(dailyStats) renderDayChart(dailyStats);

            } catch (e) { console.error("数据链路异常:", e); }
        }

        function renderHourChart(stats) {
            const ctx = document.getElementById('chartHour').getContext('2d');
            const currentH = new Date().getHours();
            const labels = [], data = [];
            for (let i = 0; i <= currentH; i++) {
                labels.push(i + ":00");
                const stat = stats.find(s => s.hour_val === i);
                data.push(stat ? stat.count_val : 0);
            }
            if (chartH) chartH.destroy();
            chartH = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ data: data, borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function renderDayChart(stats) {
            const ctx = document.getElementById('chartDay').getContext('2d');
            if (chartD) chartD.destroy();
            chartD = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: stats.map(s => s.date_label),
                    datasets: [{ data: stats.map(s => s.count_val), borderColor: '#4dabf7', backgroundColor: 'rgba(77, 171, 247, 0.1)', fill: true, tension: 0.3 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function rotateJoke() {
            const el = document.getElementById('joke-content');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerHTML = TERRA_JOKES[Math.floor(Math.random() * TERRA_JOKES.length)];
                el.style.opacity = 1;
            }, 500);
        }

        fetchData(); rotateJoke();
        setInterval(fetchData, 30000); setInterval(rotateJoke, 15000);
    </script>
</body>
</html>
