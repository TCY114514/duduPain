<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>肚肚痛监测站 💢 | Scallion Protocol v4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b6b; --bg: #fff9db; --card-bg: #ffffff; --text: #495057; --accent: #ffd43b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        /* 响应式布局：大屏并排，小屏堆叠 */
        .container {
            width: 100%; max-width: 1000px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        .main-col, .side-col { flex: 1; min-width: 320px; max-width: 480px; }

        .card {
            background: var(--card-bg); width: 100%;
            border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(255, 107, 107, 0.12);
            margin-bottom: 15px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative; overflow: hidden;
        }
        
        /* 段子卡片特殊样式 */
        .joke-card { border: 2px solid var(--accent); background: #fffdf5; }
        .joke-header { color: #e67e22; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .joke-content { text-align: left; font-size: 0.9rem; line-height: 1.6; color: #6f5540; min-height: 100px; transition: opacity 0.5s; }
        .joke-timer { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0%; transition: width 15s linear; }

        h1 { color: var(--primary); margin: 0 0 5px 0; font-size: 1.8rem; }
        h3 { margin: 0 0 15px 0; font-size: 1rem; color: #888; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .quote { font-style: italic; color: #999; font-size: 0.8rem; margin-bottom: 15px; }
        
        .btn-wrapper { display: flex; justify-content: center; align-items: center; padding: 20px 0; width: 100%; }
        #btn-main {
            width: 150px; height: 150px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252);
            color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 10px 0 #c92a2a, 0 15px 25px rgba(255,107,107,0.3);
            transition: 0.1s; outline: none; animation: pulse 2s infinite;
        }
        #btn-main:active { transform: translateY(6px); box-shadow: 0 4px 0 #c92a2a; animation: none; }
        #btn-main span { font-size: 2.5rem; display: block; margin-bottom: 2px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        
        .count-group { border-top: 1px solid #eee; padding-top: 15px; }
        #count-val { font-size: 3.5rem; color: var(--primary); font-weight: 900; display: block; }
        .refresh-tip { font-size: 0.7rem; color: #bbb; margin-top: -5px; display: block; }
        
        .report { background: #fff5f5; padding: 15px; border-radius: 15px; text-align: left; border-left: 5px solid var(--primary); font-size: 0.85rem; line-height: 1.6; }
        .history { max-height: 250px; overflow-y: auto; text-align: left; padding: 10px; border-radius: 12px; background: #f8f9fa; font-size: 0.75rem; }
        .history-item { padding: 8px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .loc-tag { color: #ff8787; font-weight: bold; font-family: serif; text-align: right; flex-shrink: 0; }
        
        .chart-container { position: relative; height: 180px; width: 100%; }
        .footer-info { margin-top: 10px; font-size: 0.65rem; color: #ced4da; text-align: left; line-height: 1.4; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-col">
            <div class="card">
                <h1>🤣 痛了吗？</h1>
                <div class="quote">“泰拉痛感分布式监测站”</div>
                
                <div class="btn-wrapper">
                    <button id="btn-main">
                        <span>😂</span>肚肚痛了！
                    </button>
                </div>

                <div class="count-group">
                    今日累计痛感
                    <span id="count-val">0</span>
                    <span class="refresh-tip">(每日 0 点刷新)</span>
                </div>
            </div>

            <div class="card">
                <h3>🕒 今日小时趋势</h3>
                <div class="chart-container">
                    <canvas id="chartHour"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>📅 最近七日趋势</h3>
                <div class="chart-container">
                    <canvas id="chartDay"></canvas>
                </div>
            </div>
        </div>

        <div class="side-col">
            <div class="card joke-card">
                <div class="joke-header">✨ 泰拉大陆“地域偏见”大赏</div>
                <div id="joke-content" class="joke-content">加载中...</div>
                <div id="joke-timer" class="joke-timer"></div>
            </div>

            <div class="card">
                <h3>📝 痛感日报</h3>
                <div id="report-text" class="report">数据链路初始化中...</div>
            </div>

            <div class="card">
                <h3>📜 历史轨迹 (近50条)</h3>
                <div id="history-list" class="history">加载中...</div>
                <div class="footer-info">
                    <b>[SYSTEM LOG]</b> Scallion Protocol v4.0<br>
                    <b>受试者：</b> 大葱 (Scallion)<br>
                    <b>定位模式：</b> 随机泰拉坐标映射
                </div>
            </div>
        </div>
    </div>

    <script>
        // === 1. 核心配置 ===
        // 请确保这里的 KEY 是正确的，如果之前失效了请替换
        const SB_URL = "https://nbhaqiynakkdlequbpbh.supabase.co"; 
        const SB_KEY = "sb_publishable_MfHndIpykrX79UrvosT9Nw_JxCYYfbp"; 
        
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        let chartHour = null;
        let chartDay = null;

        // === 2. 泰拉数据预设 ===
        const TERRA_LOCS = ["阿戈尔", "玻利瓦尔", "多索雷斯", "东国", "二户城", "姬户城", "新安芸市", "杜林", "际崖城", "天际城", "哥伦比亚", "麦克斯特区", "特里蒙", "提卡伦多", "纽莱堡市", "铸铁城", "加斯帕荒原", "卡西米尔", "卡瓦莱利亚基", "茨沃涅克", "黄金平原", "滴水村", "卡兹戴尔", "卡兹戴尔城", "贝罗尼村", "拉特兰", "司提望区", "安布罗修区", "法柏尔区", "莱塔尼亚", "沃伦姆德", "维谢海姆", "冬灵山脉", "雷姆必拓", "钢铁萝卜城", "铁腕城", "米诺斯", "科林尼亚", "雅赛努斯", "拉刻代蒙", "阿克罗蒂村", "萨尔贡", "阿卡胡拉", "长泉镇", "费坤城", "瓦伊凡地区", "凯尔图恩谷地", "萨米", "察帕特", "冬牙群山", "原初之地", "维多利亚", "伦蒂尼姆", "多伦郡", "小丘郡", "红脊镇", "石高原野", "乌萨斯", "圣骏堡", "切尔诺伯格", "涅瓦湖", "中心矿区", "谢拉格", "图里卡姆", "喀兰峰", "少女峰", "马特洪峰", "叙拉古", "七丘城", "新沃尔西尼", "帕勒莫", "炎国", "龙门", "尚蜀", "玉门", "勾吴城", "姜齐城", "天岳", "雷池", "伊比利亚", "盐风城", "潮石镇", "格兰法洛", "颂圣棱堡", "汐斯塔", "因非冰原", "焚风热土", "常暗裂谷", "苍白海", "阿加门", "骏鹰王国", "高卢", "檀"];

        const TERRA_JOKES = [
            "<b>阿戈尔：</b>据说阿戈尔人去龙门餐馆吃饭，第一件事不是看菜单，而是先往桌子上泼一桶水，看看水流方向来判断这块地精不精致。",
            "<b>哥伦比亚：</b>在哥伦比亚，连路边的流浪狗都能给你讲三分钟的“源石技艺实现财富自由”计划，如果你不听，它会试图起诉你侵犯它的演讲权。",
            "<b>拉特兰：</b>拉特兰人解决邻里纠纷的方式非常简单——比谁家炸弹的回声更好听。如果爆炸声不够清脆，说明你这人缺乏信仰。",
            "<b>叙拉古：</b>永远不要在叙拉古人面前往意面上挤番茄酱，除非你想尝试一下被塞进油桶里沉入荒野地底的滋味。",
            "<b>炎国：</b>炎国人聚在一起不一定是在练武，也有可能是在比谁更养生。如果你二十岁还没开始用保温杯泡枸杞，你会被开除出“岁”相。",
            "<b>乌萨斯：</b>乌萨斯人的字典里没有“感冒”这个词，只有“伏特加纯度不够”和“今天的风儿还不够喧嚣”。",
            "<b>卡西米尔：</b>卡西米尔的骑士不一定骑马，但一定得会摆POSE。如果你的闪光灯亮度不足以闪瞎路人的眼睛，你都不好意思说自己是竞技骑士。",
            "<b>谢拉格：</b>谢拉格人觉得所谓的“高科技”，就是指那种能在雪堆里挖出信号的黑色小方块。",
            "<b>维多利亚：</b>维多利亚贵族喝下午茶时，就算天上下的是源石结晶，只要管家还没宣布喝茶结束，他们就能优雅地坐在原地被砸成刺猬。",
            "<b>萨米：</b>萨米人从不迷路，他们只是在思考如何与树木进行一场长达三天的灵魂对话。",
            "<b>雷姆必拓：</b>如果你在雷姆必拓丢了一把扳手，别去找，直接去最近的黑市，那把扳手可能已经被改装成了能自动挖矿的机器人。",
            "<b>伊比利亚：</b>伊比利亚人看人的眼神总是带着一种“你看起来很像深海教会卧底”的怀疑，哪怕你只是个路过卖苹果的。",
            "<b>玻利瓦尔：</b>在这里，如果你早上起床没发现三种不同势力的传单塞在门缝里，那说明你家可能已经因为打仗被夷为平地了。",
            "<b>萨贡：</b>萨贡人认为，凡是不能在太阳底下晒成干的东西，都没有存在的价值。",
            "<b>东国：</b>东国人对“礼貌”的偏执达到了这种程度：刺客在暗杀你之前，会先递上一张制作精美的名片并鞠躬致意。",
            "<b>卡兹戴尔：</b>萨卡兹人出门从不问路，他们只问：“这块地儿现在归谁管？我能拆吗？”",
            "<b>龙门：</b>龙门人衡量友谊的标准很简单——如果你能帮我在贫民窟抢到一个限量版的叉烧包，你就是我的生死之交。",
            "<b>米诺斯：</b>米诺斯人觉得肌肉才是唯一的通用货币。如果你推不开健身房的大门，你就没有投票权。",
            "<b>极北之地：</b>那里的人不觉得冷，他们只是觉得空气有点“固态”。",
            "<b>罗德岛：</b>罗德岛是泰拉大陆最奇特的地方——这里的人来自五湖四海，但他们的共同特质是：不仅能忍受博士在嘴里泡面，还能忍受博士在指挥时突然掉线。"
        ];

        // === 3. 核心功能逻辑 ===

        // 随机获取泰拉地名IP
        const getRandomTerraLoc = () => `IP属地：${TERRA_LOCS[Math.floor(Math.random() * TERRA_LOCS.length)]}`;

        // 段子轮换系统
        let currentJokeIndex = -1;
        function rotateJoke() {
            const contentEl = document.getElementById('joke-content');
            const timerEl = document.getElementById('joke-timer');
            
            contentEl.style.opacity = 0; // 淡出
            
            setTimeout(() => {
                // 确保不连续抽到同一个
                let nextIndex;
                do {
                    nextIndex = Math.floor(Math.random() * TERRA_JOKES.length);
                } while (nextIndex === currentJokeIndex);
                
                currentJokeIndex = nextIndex;
                contentEl.innerHTML = TERRA_JOKES[currentJokeIndex];
                contentEl.style.opacity = 1; // 淡入
                
                // 重置进度条
                timerEl.style.transition = 'none';
                timerEl.style.width = '0%';
                setTimeout(() => {
                    timerEl.style.transition = 'width 15s linear';
                    timerEl.style.width = '100%';
                }, 50);
                
            }, 500);
        }

        // 点击按钮
        document.getElementById('btn-main').onclick = async () => {
            if (navigator.vibrate) navigator.vibrate(60);
            const btn = document.getElementById('btn-main');
            btn.style.opacity = "0.7";
            
            const randomLoc = getRandomTerraLoc();

            const { error } = await sbClient
                .from('records')
                .insert([{ location: randomLoc }]);

            btn.style.opacity = "1";
            if (!error) fetchData();
        };

        // 获取并渲染数据
        async function fetchData() {
            try {
                // 获取所有数据用于每日计算
                const { data: allRecords, error } = await sbClient
    .from('records')
    .select('created_at, location')
    .range(0, 9999) // 手动指定获取 0 到 9999 条数据
    .order('created_at', { ascending: false });

                if (error) throw error;

                // --- 1. 处理今日数据 ---
                const now = new Date();
                const todayStr = now.toDateString();
                const todayRecords = allRecords.filter(r => new Date(r.created_at).toDateString() === todayStr);
                const count = todayRecords.length;
                
                // 数字动画
                animateNumber('count-val', count);
                
                // 评价系统
                let evalText = "";
                if (count > 1433223) {
                    evalText = "🚑 <b style='color:#c92a2a'>鬼手级别</b>：让大葱痛到这辈子玩卫戍协议抓不到大C 转头发现自家大C队友人手8个精锐";
                } else if (count > 100) {
                    evalText = "💀 <b>天灾级别</b>：大葱已与大地母亲合二为一，痛觉中枢宣告下班";
                } else if (count > 50) {
                    evalText = "🌋 <b>高危级别</b>：源石结晶在肚子里蹦迪，建议火速寻找医疗干员";
                } else if (count > 20) {
                    evalText = "🔥 <b>中危级别</b>：笑穴被点，建议大葱立刻停止呼吸（误）";
                } else if (count > 5) {
                    evalText = "🌱 <b>低危级别</b>：轻微痉挛，尚在生理承受范围内";
                } else {
                    evalText = "💤 <b>安全级别</b>：岁月静好，肚皮平稳";
                }
                
                document.getElementById('report-text').innerHTML = `
                    <b>今日累计：</b> ${count} 次<br>
                    <b>痛感评价：</b> ${evalText}<br>
                    <b>链路状态：</b> 泰拉多维接入 ✅
                `;

                // --- 2. 处理小时折线图 ---
                renderHourChart(todayRecords);

                // --- 3. 处理每日折线图 (最近7天) ---
                renderDayChart(allRecords);

                // --- 4. 渲染历史记录 (近50条) ---
                document.getElementById('history-list').innerHTML = allRecords.slice(0, 50).map(r => `
                    <div class="history-item">
                        <span>🕒 ${new Date(r.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        <span class="loc-tag">${r.location}</span>
                    </div>
                `).join('') || "暂无记录";

            } catch (err) {
                console.error(err);
                document.getElementById('report-text').innerHTML = "❌ 信号塔故障（数据连接失败）";
            }
        }

        // --- 4. 图表渲染逻辑 ---

        // 核心图表配置模板
        const chartConfigBase = {
            type: 'line',
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, ticks: { stepSize: 1, color: '#999' }, grid: { color: '#eee' } },
                    x: { grid: { display: false }, ticks: { color: '#999' } }
                },
                interaction: { intersect: false, mode: 'index' }
            }
        };

        // 小时图
        function renderHourChart(todayData) {
            const ctx = document.getElementById('chartHour').getContext('2d');
            const dataCounts = Array(24).fill(0);
            todayData.forEach(r => dataCounts[new Date(r.created_at).getHours()]++);
            
            const currentHour = new Date().getHours();
            const labels = Array.from({length: currentHour + 1}, (_, i) => i + ":00");
            const finalData = dataCounts.slice(0, currentHour + 1);

            if (chartHour) chartHour.destroy();
            chartHour = new Chart(ctx, {
                ...chartConfigBase,
                data: {
                    labels: labels,
                    datasets: [{
                        data: finalData, borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 3, hoverPointRadius: 5
                    }]
                }
            });
        }

        // 每日图
        function renderDayChart(allRecords) {
            const ctx = document.getElementById('chartDay').getContext('2d');
            
            // 统计最近7天数据
            const dayCounts = {};
            const labels = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toLocaleDateString([], {month: 'numeric', day: 'numeric'});
                labels.push(dateStr);
                dayCounts[d.toDateString()] = 0;
            }

            allRecords.forEach(r => {
                const recDateStr = new Date(r.created_at).toDateString();
                if (dayCounts[recDateStr] !== undefined) {
                    dayCounts[recDateStr]++;
                }
            });

            const finalData = Object.values(dayCounts);

            if (chartDay) chartDay.destroy();
            chartDay = new Chart(ctx, {
                ...chartConfigBase,
                data: {
                    labels: labels,
                    datasets: [{
                        data: finalData, borderColor: '#4dabf7', // 换个颜色区分
                        backgroundColor: 'rgba(77, 171, 247, 0.1)',
                        fill: true, tension: 0.3, pointRadius: 4, hoverPointRadius: 6
                    }]
                },
                options: {
                    ...chartConfigBase.options,
                    scales: {
                        ...chartConfigBase.options.scales,
                        y: { ...chartConfigBase.options.scales.y, ticks: { stepSize: 5, color: '#999' } } // 每日刻度大一点
                    }
                }
            });
        }

        // 数字增加动画
        function animateNumber(id, final, duration = 500) {
            const el = document.getElementById(id);
            const start = parseInt(el.innerText) || 0;
            if (start === final) return;
            let startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                el.innerText = Math.floor(progress * (final - start) + start);
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        // === 5. 初始化 ===
        fetchData();
        rotateJoke();
        
        // 定时器
        setInterval(fetchData, 60000); // 1分钟刷新一次数据
        setInterval(rotateJoke, 15000); // 15秒轮换一次段子
    </script>
</body>
</html>
