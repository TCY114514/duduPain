<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>肚肚痛监测站 💢 | Scallion Protocol</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b6b; --bg: #fff9db; --card-bg: #ffffff; --text: #495057; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .card {
            background: var(--card-bg); width: 100%; max-width: 480px;
            border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(255, 107, 107, 0.12);
            margin-bottom: 15px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.8);
        }
        h1 { color: var(--primary); margin: 0 0 5px 0; font-size: 1.8rem; }
        .quote { font-style: italic; color: #999; font-size: 0.8rem; margin-bottom: 15px; }
        .btn-wrapper { display: flex; justify-content: center; align-items: center; padding: 20px 0; width: 100%; }
        #btn-main {
            width: 150px; height: 150px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #ff8787, #fa5252);
            color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 10px 0 #c92a2a, 0 15px 25px rgba(255,107,107,0.3);
            transition: 0.1s; outline: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: pulse 2s infinite;
        }
        #btn-main:active { transform: translateY(6px); box-shadow: 0 4px 0 #c92a2a; animation: none; }
        #btn-main span { font-size: 2.5rem; display: block; margin-bottom: 2px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        #count-val { font-size: 3rem; color: var(--primary); font-weight: 900; display: block; margin-top: 5px; }
        .report { background: #fff5f5; padding: 15px; border-radius: 15px; text-align: left; border-left: 5px solid var(--primary); font-size: 0.85rem; line-height: 1.6; }
        .history { max-height: 300px; overflow-y: auto; text-align: left; padding: 10px; border-radius: 12px; background: #f8f9fa; font-size: 0.75rem; }
        .history-item { padding: 8px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; align-items: center; }
        .loc-tag { color: #ff8787; font-weight: bold; font-family: serif; }
        canvas { margin-top: 10px; max-height: 180px; }
        .footer-info { margin-top: 10px; font-size: 0.65rem; color: #ced4da; text-align: left; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🤣 痛了吗？</h1>
        <div class="quote">“泰拉痛感分布式监测站”</div>
        
        <div class="btn-wrapper">
            <button id="btn-main">
                <span>😂</span>
                肚肚痛了！
            </button>
        </div>

        <div style="font-size: 1rem; border-top: 1px solid #eee; padding-top: 15px;">
            今日累计痛感
            <span id="count-val">0</span>
        </div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size:1rem;">📈 痛感分布图</h3>
        <canvas id="chartCanvas"></canvas>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size:1rem;">📝 痛感日报</h3>
        <div id="report-text" class="report">数据链路初始化中...</div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size:1rem;">📜 历史轨迹 (近50条)</h3>
        <div id="history-list" class="history">加载中...</div>
        <div class="footer-info">
            <b>[SYSTEM LOG]</b> 项目：Scallion Protocol<br>
            <b>受试者：</b> 大葱 (Scallion)<br>
            <b>定位模式：</b> 随机泰拉坐标映射
        </div>
    </div>

    <script>
        // === 1. 核心配置 ===
        const SB_URL = "https://nbhaqiynakkdlequbpbh.supabase.co"; 
        const SB_KEY = "sb_publishable_MfHndIpykrX79UrvosT9Nw_JxCYYfbp"; 
        
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        let myChart = null;

        // 地名库
        const TERRA_LOCS = [
            "阿戈尔", "玻利瓦尔", "多索雷斯", "东国", "二户城", "姬户城", "新安芸市", "杜林", "际崖城", "天际城",
            "哥伦比亚", "麦克斯特区", "特里蒙", "提卡伦多", "纽莱堡市", "铸铁城", "加斯帕荒原", "卡西米尔",
            "卡瓦莱利亚基", "茨沃涅克", "黄金平原", "滴水村", "卡兹戴尔", "卡兹戴尔城", "贝罗尼村", "拉特兰",
            "司提望区", "安布罗修区", "法柏尔区", "莱塔尼亚", "沃伦姆德", "维谢海姆", "冬灵山脉", "雷姆必拓",
            "钢铁萝卜城", "铁腕城", "米诺斯", "科林尼亚", "雅赛努斯", "拉刻代蒙", "阿克罗蒂村", "萨尔贡",
            "阿卡胡拉", "长泉镇", "费坤城", "瓦伊凡地区", "凯尔图恩谷地", "萨米", "察帕特", "冬牙群山",
            "原初之地", "维多利亚", "伦蒂尼姆", "多伦郡", "小丘郡", "红脊镇", "石高原野", "乌萨斯", "圣骏堡",
            "切尔诺伯格", "涅瓦湖", "中心矿区", "谢拉格", "图里卡姆", "喀兰峰", "少女峰", "马特洪峰", "叙拉古",
            "七丘城", "新沃尔西尼", "帕勒莫", "炎国", "龙门", "尚蜀", "玉门", "勾吴城", "姜齐城", "天岳", "雷池",
            "伊比利亚", "盐风城", "潮石镇", "格兰法洛", "颂圣棱堡", "汐斯塔", "因非冰原", "焚风热土", "常暗裂谷",
            "苍白海", "阿加门", "骏鹰王国", "高卢", "檀"
        ];

        // 随机获取地名
        function getRandomTerraLoc() {
            const loc = TERRA_LOCS[Math.floor(Math.random() * TERRA_LOCS.length)];
            return `IP属地：${loc}`;
        }

        // 点击按钮
        document.getElementById('btn-main').onclick = async () => {
            if (navigator.vibrate) navigator.vibrate(60);
            const btn = document.getElementById('btn-main');
            btn.style.opacity = "0.7";
            
            const randomLoc = getRandomTerraLoc();

            const { error } = await sbClient
                .from('records')
                .insert([{ location: randomLoc }]);

            btn.style.opacity = "1";
            if (!error) fetchData();
        };

        async function fetchData() {
            try {
                const { data: records, error } = await sbClient
                    .from('records')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const todayRecords = records.filter(r => new Date(r.created_at).toDateString() === new Date().toDateString());
                const count = todayRecords.length;
                document.getElementById('count-val').innerText = count;
                
                // 评价系统逻辑
                let evalText = "";
                if (count > 1433223) {
                    evalText = "🚑 鬼手级别：让大葱痛到这辈子玩卫戍协议抓不到大C 转头发现自家大C队友人手8个精锐";
                } else if (count > 50) {
                    evalText = "💀 级别：大葱已与大地母亲合二为一，痛觉中枢宣告下班";
                } else if (count > 30) {
                    evalText = "🌋 级别：源石结晶在肚子里蹦迪，建议火速寻找医疗干员";
                } else if (count > 15) {
                    evalText = "🔥 级别：笑穴被点，建议大葱立刻停止呼吸（误）";
                } else if (count > 5) {
                    evalText = "🌱 级别：轻微痉挛，尚在生理承受范围内";
                } else {
                    evalText = "💤 级别：岁月静好，肚皮平稳";
                }
                
                document.getElementById('report-text').innerHTML = `
                    <b>累计次数：</b> ${count} 次<br>
                    <b>痛感评价：</b> ${evalText}<br>
                    <b>链路：</b> 泰拉多维接入 ✅
                `;

                // 显示近50条记录
                document.getElementById('history-list').innerHTML = records.slice(0, 50).map(r => `
                    <div class="history-item">
                        <span>🕒 ${new Date(r.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        <span class="loc-tag">${r.location}</span>
                    </div>
                `).join('') || "暂无记录";

                renderChart(todayRecords);
            } catch (err) {
                document.getElementById('report-text').innerHTML = "❌ 信号塔故障（数据库连接失败）";
            }
        }

        function renderChart(todayData) {
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            const dataCounts = Array(24).fill(0);
            todayData.forEach(r => dataCounts[new Date(r.created_at).getHours()]++);
            const currentHour = new Date().getHours();
            const labels = Array.from({length: currentHour + 1}, (_, i) => i + ":00");
            const finalData = dataCounts.slice(0, currentHour + 1);

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: finalData, borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, ticks: { stepSize: 1 } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        fetchData();
        setInterval(fetchData, 30000); 
    </script>
</body>
</html>
